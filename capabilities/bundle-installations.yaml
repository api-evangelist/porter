        description: Porter Create an installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-installations-namespace-name
      path: /v1/installations/{namespace}/{name}
      operations:
      - name: getinstallation
        method: GET
        description: Porter Get an installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchinstallation
        method: PATCH
        description: Porter Update an installation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
