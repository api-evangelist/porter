principles:
  - name: Visibility
    description: Cost is realized in the underlying Kubernetes cluster, OCI registry, and storage that Porter bundles deploy onto; observe those provider invoices, not Porter itself.
  - name: Allocation
    description: Allocate by the target Kubernetes namespace and registry repo that bundle installs land in; tag bundles with team labels so downstream cluster cost-allocation tools can attribute spend.
  - name: Optimization
    description: Optimization happens at the bundle target (cluster sizing, registry storage classes, image layer reuse). Porter itself contributes no recurring cost.
  - name: Accountability
    description: Bundle authors are accountable for what their bundles install; cluster and registry owners are accountable for the resulting consumption.
