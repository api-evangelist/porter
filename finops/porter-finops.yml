description: >-
  FOCUS-aligned FinOps placeholder for Porter. As a CNCF Sandbox open-source
  project, Porter has no direct billing surface; any FinOps treatment lives in
  the underlying Kubernetes cluster, container registry, and storage providers
  the bundles deploy onto. There are no Porter invoices, meters, or seat fees
  to allocate.
