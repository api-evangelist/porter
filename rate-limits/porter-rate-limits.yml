specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Porter
providerId: porter
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Native
  - CNAB
  - Kubernetes
  - Rate Limiting
description: >-
  Porter is a client-side CLI and Go library for building, distributing, and
  installing CNAB bundles. It is not a hosted API, so there are no
  network-level rate limits to enforce or document. Any rate limiting that
  affects a Porter workflow is imposed by the upstream OCI / Docker registry
  the bundle is pushed or pulled from (Docker Hub, GHCR, ACR, ECR, etc.)
  and is governed by that registry's policy.
sources:
  - https://porter.sh/
responseCodes: {}
limits:
  - name: Upstream OCI registry pulls
    scope: registry
    metric: varies
    limit: governed by upstream OCI registry (Docker Hub, GHCR, ACR, ECR, etc.)
    notes: Porter inherits whatever rate limits the OCI registry hosting the bundle enforces.
policies:
  - name: Registry-level throttling
    description: Use authenticated registry credentials and consider mirror or pull-through caches for high-volume CI to avoid Docker Hub anonymous-pull limits.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
notes: >-
  Porter has no hosted API surface and therefore no provider-published rate
  limits. Marked reconciled=false because there is nothing to reconcile.
