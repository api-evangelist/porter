specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Porter
providerId: porter
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Native
  - CNAB
  - DevOps
  - Kubernetes
  - Package Manager
description: >-
  Porter (porter.sh) is a CNCF Sandbox open-source project for packaging
  Cloud Native Application Bundles (CNAB). It is community-governed under
  The Linux Foundation, distributed via Docker registries and tgz files,
  and has no commercial pricing, paid plans, or hosted SaaS offering. The
  surface listed in apis.yml (Bundle / Mixins / Plugins) is a code-level
  Go API and CLI rather than a billed network API.
sources:
  - https://porter.sh/
  - https://www.cncf.io/sandbox-projects/
plans:
  - id: porter-open-source
    name: Open Source
    type: freemium
    description: Free open-source distribution under CNCF Sandbox / Linux Foundation governance. No paid tier.
    entries:
      - label: Distribution
        name: distribution
        type: flat
        metric: download
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Porter CLI
      - name: Porter Bundle Tooling
      - name: Mixins
      - name: Plugins
      - name: Community Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
notes: >-
  Porter is a CNCF Sandbox project; there is no commercial pricing page,
  no paid plans, and no hosted/managed Porter SaaS to reconcile against.
  Marked reconciled=false to flag that there is nothing to reconcile.
